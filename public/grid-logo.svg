<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 42 42">
  <defs>
    <clipPath id="c">
      <rect width="42" height="42" rx="6"/>
    </clipPath>
    <filter id="g" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g clip-path="url(#c)">
    <!-- Dark base -->
    <rect width="42" height="42" fill="#020712"/>
    <!-- Vertical center stripe -->
    <rect x="20" y="0" width="2" height="42" fill="rgba(33,212,255,0.64)"/>
    <!-- Horizontal center stripe -->
    <rect x="0" y="20" width="42" height="2" fill="rgba(33,212,255,0.64)"/>
    <!-- Subtle cyan tint -->
    <rect width="42" height="42" fill="rgba(33,212,255,0.08)"/>
  </g>

  <!-- Outer border -->
  <rect x="0.5" y="0.5" width="41" height="41" rx="5.5" fill="none" stroke="rgba(33,212,255,0.62)" stroke-width="1"/>
  <!-- Inner box (inset 8px) -->
  <rect x="8.5" y="8.5" width="25" height="25" fill="none" stroke="rgba(33,212,255,0.5)" stroke-width="1"/>
  <!-- Center dot with glow -->
  <rect x="17" y="17" width="8" height="8" fill="#21d4ff" filter="url(#g)"/>
</svg>
